<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Savdo Hisoblash</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header class="topbar">
    <div class="container">
        <h1>Savdo Hisoblash Ilovasi</h1>
    </div>
</header>

<main class="container" style="max-width: 400px; margin-top: 50px;">
    <section class="card">
        <h2>📝 Ro'yxatdan o'tish</h2>
        {% if error %}
            <p style="color: red; margin-bottom: 15px;">{{ error }}</p>
        {% endif %}
        <form action="/register" method="post" class="form">
            <label>Foydalanuvchi nomi
                <input type="text" name="username" required>
            </label>

            <label>Parol
                <input type="password" name="password" required>
            </label>

            <button type="submit" class="btn primary" style="width: 100%;">Ro'yxatdan o'tish</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">
            Hisobingiz bormi? <a href="/login">Kirish</a>
        </p>
    </section>
</main>

</body>
</html>
